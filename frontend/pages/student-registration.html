<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Registration | ISA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/auth.css" />
  <style>
    .auth-success-card {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f8fafc;
    }
    .success-alert {
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      background: #ecfdf3;
      color: #14532d;
      border: 1px solid #86efac;
      font-size: 0.9rem;
    }
    .auth-container form {
      margin-bottom: 10px;
    }
    .password-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .password-row input {
      flex: 1;
    }
    .toggle-password-btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
  <script src="../js/api-base.js"></script>
</head>

<body class="student-registration-page">
  <div class="auth-container">
    <h2>Create Student Account</h2>
    <p class="subtitle">Enter your details to get started.</p>

    <form id="studentRegisterForm">
      <label>Email Address</label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="student@example.com"
        required
      />

      <label>Full Name (optional)</label>
      <input
        type="text"
        name="fullName"
        id="fullName"
        placeholder="e.g. Samson Adewale"
      />

      <label>Password</label>
      <div class="password-row">
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Minimum 8 characters"
          required
          minlength="8"
        />
        <button type="button" id="togglePasswordBtn" class="toggle-password-btn">Show</button>
      </div>

      <label>Confirm Password</label>
      <div class="password-row">
        <input
          type="password"
          name="confirmPassword"
          id="confirmPassword"
          placeholder="Re-enter your password"
          required
          minlength="8"
        />
        <button type="button" id="toggleConfirmPasswordBtn" class="toggle-password-btn">Show</button>
      </div>

      <button type="submit" class="primary-btn">Create Account</button>

      <p class="auth-footer">
        Already registered?
        <a href="/frontend/pages/student-login.html">Sign in</a>
      </p>
    </form>

    <div id="registerSuccess" class="auth-success-card" hidden>
      <div class="success-alert" role="alert">Account created successfully.</div>
      <h3>Account created successfully</h3>
      <p>Redirecting you to complete your profile.</p>
    </div>
  </div>

  <script src="../js/student-registration.js"></script>
</body>
</html>
