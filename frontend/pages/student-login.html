<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login | Intensive Study Academy</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link rel="stylesheet" href="../css/auth.css" />
  <style>
    .password-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .password-row input {
      flex: 1;
    }
    .toggle-password-btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .auth-link-btn {
      background: none;
      border: none;
      color: #2563eb;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      margin: 6px 0 0;
      font-size: 0.9rem;
    }
  </style>

<script src="../js/api-base.js"></script>
</head>

<body class="auth-page">

  <div class="auth-container">
    <h1>Student Login</h1>
    <p>Login to access your student dashboard</p>

    <form id="studentLoginForm">
      <div class="form-group">
        <label>Email</label>
        <input
          id="email"
          type="email"
          placeholder="Enter your email address"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-row">
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required
          />
          <button id="togglePasswordBtn" class="toggle-password-btn" type="button">Show</button>
        </div>
      </div>

      <button id="forgotPasswordBtn" class="auth-link-btn" type="button">
        Forgot password?
      </button>
       
      <p class="auth-note">
     New student?
      <a href="/frontend/pages/student-registration.html">Create an account</a>
        </p>

      <button type="submit" class="primary-btn">
        Login
      </button>
    </form>

    <p class="auth-note">
      Having trouble logging in? Contact support.
      <a href="https://wa.me/2347073859837" target="_blank" rel="noopener">
        <i class="fab fa-whatsapp"></i>
      </a>
    </p>
  </div>
<script src="../js/student-login.js"></script>
</body>
</html>
