<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Student Password | Intensive Study Academy</title>
  <link rel="stylesheet" href="../css/auth.css" />
  <style>
    .password-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .password-row input {
      flex: 1;
    }
    .toggle-password-btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
  <script src="../js/api-base.js"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>Reset Password</h1>
    <p>Enter your new student password.</p>

    <form id="studentResetPasswordForm">
      <div class="form-group">
        <label>New Password</label>
        <div class="password-row">
          <input id="password" type="password" placeholder="Minimum 8 characters" required minlength="8" />
          <button id="togglePasswordBtn" type="button" class="toggle-password-btn">Show</button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-row">
          <input id="confirmPassword" type="password" placeholder="Re-enter password" required minlength="8" />
          <button id="toggleConfirmPasswordBtn" type="button" class="toggle-password-btn">Show</button>
        </div>
      </div>

      <button type="submit" class="primary-btn">Reset Password</button>
      <p class="auth-note"><a href="/frontend/pages/student-login.html">Back to login</a></p>
    </form>
  </div>

  <script src="../js/student-reset-password.js"></script>
</body>
</html>
